<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Uplift 3.0 — Discovery</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a22;
    --panel-2: #1d222d;
    --border: #2a3140;
    --text: #e6e9ef;
    --muted: #8b95a8;
    --accent: #6ea8ff;
    --accent-soft: #1f2c44;
    --warn: #ffb347;
    --good: #5ddc8a;
    --code: #0a0c10;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { min-height: 100vh; }
  .wrap { max-width: 920px; margin: 0 auto; padding: 24px 16px 96px; }
  header { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 4px 18px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.3px; }
  header h1 .v { color: var(--muted); font-weight: 400; }
  header .meta { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  header .meta .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; background: var(--panel); border: 1px solid var(--border); margin-left: 6px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 16px; }
  .panel h2 { margin: 0 0 10px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); }
  .pitch { display: flex; gap: 8px; }
  .pitch input { flex: 1; background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 12px; font: inherit; }
  .pitch input:focus { outline: none; border-color: var(--accent); }
  button { background: var(--accent); color: #0a1224; border: 0; border-radius: 8px; padding: 10px 16px; font: 600 14px inherit; cursor: pointer; }
  button.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); font-weight: 500; }
  button:hover:not(:disabled) { filter: brightness(1.1); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .last-input { color: var(--muted); font-size: 13px; padding-left: 10px; border-left: 2px solid var(--border); }
  .last-input em { color: var(--accent); font-style: normal; }
  .reflection { white-space: pre-wrap; }
  .mcq { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; }
  .mcq .header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
  .mcq .gap { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; color: var(--accent); background: var(--accent-soft); padding: 2px 6px; border-radius: 4px; }
  .mcq .title { font-weight: 600; font-size: 14px; }
  .mcq .stem { color: var(--text); margin-bottom: 10px; white-space: pre-wrap; }
  .options { display: flex; flex-direction: column; gap: 6px; }
  .options label { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: background 80ms, border-color 80ms; }
  .options label:hover { background: rgba(110,168,255,0.06); }
  .options label.selected { border-color: var(--accent); background: var(--accent-soft); }
  .options input[type=radio] { margin-top: 3px; accent-color: var(--accent); }
  .options .letter { color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; padding-top: 1px; min-width: 14px; }
  .options .text { flex: 1; }
  .compose { position: sticky; bottom: 0; background: linear-gradient(180deg, rgba(15,17,21,0) 0%, var(--bg) 30%); padding-top: 20px; margin-top: 8px; }
  .compose textarea { width: 100%; min-height: 110px; background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 12px 14px; font: inherit; resize: vertical; }
  .compose textarea:focus { outline: none; border-color: var(--accent); }
  .compose .row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; gap: 12px; }
  .compose .hint { color: var(--muted); font-size: 12px; }
  .codes { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--muted); background: var(--code); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; word-break: break-all; }
  .error { background: #3a1a1a; border: 1px solid #6e2a2a; color: #ffd2d2; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; white-space: pre-wrap; font-size: 13px; }
  .empty { color: var(--muted); padding: 32px 0; text-align: center; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--muted); border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: -2px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .phase-gate { background: rgba(255,179,71,0.08); border: 1px solid rgba(255,179,71,0.35); border-radius: 8px; padding: 12px 14px; color: var(--warn); }
  .phase-gate strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Uplift <span class="v">3.0 · discovery</span></h1>
    <div class="meta" id="meta"></div>
  </header>

  <div id="error" class="error" hidden></div>

  <div class="panel" id="newPanel">
    <h2>Start a new session</h2>
    <div class="pitch">
      <input id="pitchInput" placeholder="One-line pitch (e.g. Car selling app)" />
      <button id="startBtn">Start</button>
    </div>
  </div>

  <div id="turnPanel" hidden>
    <div class="panel" id="lastInputPanel" hidden>
      <h2>Your last message</h2>
      <div class="last-input" id="lastInput"></div>
    </div>

    <div class="panel" id="reflectionPanel" hidden>
      <h2>Reflection</h2>
      <div class="reflection" id="reflection"></div>
    </div>

    <div class="panel" id="questionsPanel">
      <h2>Questions</h2>
      <div id="phaseGate" class="phase-gate" hidden></div>
      <div id="questions"></div>
    </div>

    <div class="compose">
      <textarea id="answer" placeholder="Select options above — each is submitted as Gx: your choice and closes that gap. Or type free-form."></textarea>
      <div class="row">
        <div class="hint">⌘ + Enter to submit · format: <code>Gx: chosen option</code></div>
        <div>
          <button class="secondary" id="resetBtn">New session</button>
          <button id="submitBtn">Submit answer</button>
        </div>
      </div>
    </div>

    <div class="panel" style="margin-top:18px">
      <h2>State codes</h2>
      <div class="codes" id="stateCodes">—</div>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const state = { session_id: null, turn: 0, questions: [], selections: {} };

function setError(msg) {
  const el = $("error");
  if (!msg) { el.hidden = true; el.textContent = ""; return; }
  el.hidden = false; el.textContent = msg;
}

function renderMeta() {
  const m = $("meta");
  if (!state.session_id) { m.textContent = "no active session"; return; }
  const phaseMatch = (state.state_codes || "").match(/^(P\d)/);
  const phase = phaseMatch ? phaseMatch[1] : "—";
  m.innerHTML = `<span class="pill">${state.session_id}</span><span class="pill">turn ${String(state.turn).padStart(2,"0")}</span><span class="pill">phase ${phase}</span>`;
}

function buildAnswerFromSelections() {
  const parts = [];
  for (const q of state.questions) {
    const sel = state.selections[q.gap];
    if (!sel) continue;
    const opt = q.options.find(o => o.letter === sel.letter);
    if (!opt) continue;
    const body = sel.letter === "D" && sel.custom ? sel.custom : opt.text;
    parts.push(`${q.gap}: ${body}`);
  }
  return parts.join("\n");
}

function refreshAnswerField(force = false) {
  const ta = $("answer");
  const built = buildAnswerFromSelections();
  if (!built) return;
  if (force || ta.dataset.userEdited !== "1" || !ta.value.trim()) {
    ta.value = built;
    ta.dataset.userEdited = "0";
  }
}

function resolveSubmitText() {
  const ta = $("answer");
  const typed = ta.value.trim();
  const fromSelections = buildAnswerFromSelections();
  if (typed && fromSelections && typed !== fromSelections) {
    // User edited beyond MCQ picks — send what they typed.
    return typed;
  }
  return typed || fromSelections;
}

function renderTurn(data) {
  state.session_id = data.session_id;
  state.turn = data.turn || 0;
  state.questions = data.questions || [];
  state.state_codes = data.state_codes || "";
  state.selections = {};

  $("newPanel").hidden = !!state.session_id;
  $("turnPanel").hidden = !state.session_id;
  renderMeta();

  if (data.last_user_input) {
    $("lastInputPanel").hidden = false;
    $("lastInput").innerHTML = `<em>You:</em> ${escapeHtml(data.last_user_input)}`;
  } else {
    $("lastInputPanel").hidden = true;
  }

  if (data.reflection) {
    $("reflectionPanel").hidden = false;
    $("reflection").textContent = data.reflection;
  } else {
    $("reflectionPanel").hidden = true;
  }

  const qContainer = $("questions");
  const gate = $("phaseGate");
  qContainer.innerHTML = "";

  if (data.phase_gate) {
    gate.hidden = false;
    gate.innerHTML = `<strong>Phase gate</strong>${escapeHtml(data.phase_gate_note || "No MCQs this turn — share more context.")}`;
  } else if (!state.questions.length && data.raw) {
    gate.hidden = true;
    qContainer.innerHTML = `<div class="mcq"><div class="stem">${escapeHtml(data.raw)}</div></div>`;
  } else {
    gate.hidden = true;
    for (const q of state.questions) {
      qContainer.appendChild(renderMcq(q));
    }
  }

  $("stateCodes").textContent = state.state_codes || "—";
  $("answer").value = "";
  $("answer").dataset.userEdited = "0";
  $("answer").focus();
}

function renderMcq(q) {
  const card = document.createElement("div");
  card.className = "mcq";
  card.innerHTML = `
    <div class="header">
      <span class="gap">${escapeHtml(q.gap)}</span>
      <span class="title">${escapeHtml(q.title)}</span>
    </div>
    <div class="stem">${escapeHtml(q.stem)}</div>
    <div class="options"></div>
  `;
  const opts = card.querySelector(".options");
  for (const opt of q.options) {
    const label = document.createElement("label");
    label.innerHTML = `
      <input type="radio" name="opt-${q.gap}" value="${opt.letter}" />
      <span class="letter">${opt.letter})</span>
      <span class="text">${escapeHtml(opt.text)}</span>
    `;
    const radio = label.querySelector("input");
    radio.addEventListener("change", () => {
      card.querySelectorAll("label").forEach(l => l.classList.remove("selected"));
      label.classList.add("selected");
      state.selections[q.gap] = { letter: opt.letter };
      if (opt.letter === "D") {
        let custom = card.querySelector(".d-custom");
        if (!custom) {
          custom = document.createElement("input");
          custom.type = "text";
          custom.className = "d-custom";
          custom.placeholder = "Tell us your alternative…";
          custom.style.cssText = "margin-top:8px; width:100%; background:var(--panel); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:8px 10px; font:inherit;";
          card.appendChild(custom);
          custom.addEventListener("input", () => {
            state.selections[q.gap].custom = custom.value;
            refreshAnswerField(true);
          });
        }
        custom.focus();
      }
      refreshAnswerField(true);
    });
    opts.appendChild(label);
  }
  return card;
}

function escapeHtml(s) {
  return String(s || "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

async function api(path, opts) {
  if (location.protocol === "file:") {
    throw new Error("This page must be served by server.py. You opened it as a file:// URL. Run `python3 uplift-v3.0/web/server.py` then visit http://127.0.0.1:8765");
  }
  let res;
  try {
    res = await fetch(path, opts);
  } catch (e) {
    throw new Error(`Cannot reach server at ${location.origin}. Is server.py running on this port? (${e.message})`);
  }
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(body.error || `HTTP ${res.status} from ${path}`);
  return body;
}

async function loadState() {
  try {
    const data = await api("/api/state");
    if (data && data.session_id) renderTurn(data);
  } catch (e) { setError(e.message); }
}

async function submitTurn(text, isNew) {
  setError("");
  const btn = isNew ? $("startBtn") : $("submitBtn");
  const orig = btn.innerHTML;
  btn.disabled = true;
  $("submitBtn").disabled = true;
  $("startBtn").disabled = true;
  btn.innerHTML = `<span class="spinner"></span>thinking… (may take 30–60s)`;
  try {
    const data = await api("/api/turn", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, new: !!isNew }),
    });
    renderTurn(data);
    if (!data.phase_gate && !(data.questions || []).length) {
      setError("Turn completed but no questions were parsed. Check the raw output below, or restart the server if you recently updated the code.");
    }
    window.scrollTo({ top: 0, behavior: "smooth" });
  } catch (e) {
    setError(e.message);
  } finally {
    btn.disabled = false;
    $("submitBtn").disabled = false;
    $("startBtn").disabled = false;
    btn.innerHTML = orig;
  }
}

$("startBtn").addEventListener("click", () => {
  const v = $("pitchInput").value.trim();
  if (!v) {
    setError("Enter a one-line pitch to start.");
    return;
  }
  submitTurn(v, true);
});

$("pitchInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") $("startBtn").click();
});

$("submitBtn").addEventListener("click", () => {
  const v = resolveSubmitText();
  if (!v) {
    setError("Select an option above or type your answer in the box below.");
    $("answer").focus();
    return;
  }
  $("answer").value = v;
  submitTurn(v, false);
});

$("answer").addEventListener("input", (e) => {
  if (e.isTrusted) e.target.dataset.userEdited = "1";
});

$("answer").addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
    e.preventDefault();
    $("submitBtn").click();
  }
});

$("resetBtn").addEventListener("click", () => {
  if (!confirm("Start a new session? Current one will remain on disk.")) return;
  state.session_id = null;
  $("turnPanel").hidden = true;
  $("newPanel").hidden = false;
  renderMeta();
  $("pitchInput").focus();
});

loadState();
</script>
</body>
</html>
