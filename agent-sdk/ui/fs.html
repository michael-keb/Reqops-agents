<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandbox Files</title>
<style>
  :root {
    --app-bg: #0d0f13;
    --chrome-bg: #12151b;
    --panel-bg: #171b22;
    --panel-elev: #1d222b;
    --panel-elev-2: #222834;
    --editor-bg: #101319;
    --border: #2a303a;
    --border-soft: #232934;
    --text: #d9dee7;
    --text-muted: #9ca5b4;
    --text-faint: #7b8492;
    --accent: #6b91ff;
    --accent-strong: #7ca6ff;
    --success: #4bb382;
    --warning: #d2a254;
    --danger: #d46b6b;
    --shadow: 0 22px 70px rgba(0, 0, 0, 0.45);
    --radius-xl: 18px;
    --radius-lg: 13px;
    --radius-md: 10px;
    --radius-sm: 8px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
    background:
      radial-gradient(circle at top left, rgba(107, 145, 255, 0.12), transparent 28%),
      radial-gradient(circle at bottom right, rgba(74, 104, 163, 0.15), transparent 26%),
      linear-gradient(180deg, #0d1014 0%, #0a0c10 100%);
    color: var(--text);
    padding: 14px;
    overflow: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
    opacity: 0.18;
  }

  #shell {
    position: relative;
    z-index: 1;
    width: 100%;
    height: calc(100vh - 28px);
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 24%),
      var(--panel-bg);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  #shell::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 8%),
      radial-gradient(circle at top, rgba(124, 166, 255, 0.08), transparent 40%);
    pointer-events: none;
  }

  .topbar {
    position: relative;
    padding: 10px 12px 9px;
    border-bottom: 1px solid var(--border-soft);
    background: rgba(12, 14, 18, 0.78);
    backdrop-filter: blur(18px);
    z-index: 10;
  }

  .topbar-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 9px;
  }

  .title-stack {
    display: flex;
    align-items: center;
    gap: 9px;
    min-width: 0;
  }

  .title-badge {
    width: 28px;
    height: 28px;
    display: grid;
    place-items: center;
    border-radius: 9px;
    border: 1px solid var(--border);
    background:
      linear-gradient(180deg, rgba(124, 166, 255, 0.18), rgba(124, 166, 255, 0.05)),
      var(--panel-elev);
    color: var(--accent-strong);
    font-size: 14px;
  }

  .title-copy h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .controls {
    display: grid;
    grid-template-columns: 2fr 1.5fr 0.8fr;
    gap: 8px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .field-label {
    color: var(--text-faint);
    font-size: 10px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .field input {
    width: 100%;
    min-width: 0;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: var(--editor-bg);
    color: var(--text);
    padding: 8px 9px;
    font-size: 12px;
    outline: none;
  }

  .field input:focus {
    border-color: #4560a6;
    box-shadow: 0 0 0 1px rgba(69, 96, 166, 0.35);
  }

  button {
    border: 1px solid var(--border);
    border-radius: 9px;
    background: var(--panel-elev);
    color: var(--text);
    cursor: pointer;
    transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
    padding: 8px 12px;
    font-size: 12px;
    font-family: inherit;
  }

  button:hover {
    background: var(--panel-elev-2);
    border-color: #364050;
  }

  button:active {
    transform: translateY(1px);
  }

  button.primary {
    border-color: rgba(107, 145, 255, 0.35);
    background:
      linear-gradient(180deg, rgba(107, 145, 255, 0.18), rgba(107, 145, 255, 0.08)),
      var(--panel-elev);
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  #content {
    position: relative;
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  #tree {
    width: 260px;
    background: var(--editor-bg);
    border-right: 1px solid var(--border-soft);
    overflow-y: auto;
    padding: 8px 0;
  }

  #tree::-webkit-scrollbar {
    width: 10px;
  }

  #tree::-webkit-scrollbar-thumb {
    background: #252c36;
    border: 2px solid transparent;
    border-radius: 999px;
    background-clip: padding-box;
  }

  .tree-node {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    cursor: pointer;
    user-select: none;
    transition: background 80ms ease;
    font-size: 12px;
    line-height: 1.4;
  }

  .tree-node:hover {
    background: rgba(124, 166, 255, 0.08);
  }

  .tree-node.selected {
    background: rgba(107, 145, 255, 0.15);
    color: var(--accent-strong);
  }

  .tree-node.directory {
    font-weight: 500;
  }

  .tree-icon {
    flex-shrink: 0;
    font-size: 14px;
  }

  .tree-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .tree-size {
    flex-shrink: 0;
    color: var(--text-faint);
    font-size: 11px;
  }

  .tree-children {
    padding-left: 16px;
  }

  .drag-handle {
    width: 1px;
    background: var(--border-soft);
    cursor: col-resize;
    position: relative;
  }

  .drag-handle:hover,
  .drag-handle.dragging {
    background: var(--accent);
  }

  #viewer {
    flex: 1;
    background: var(--panel-bg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #viewer-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-soft);
    background: var(--editor-bg);
  }

  #viewer-header h2 {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
  }

  #viewer-header p {
    font-size: 11px;
    color: var(--text-muted);
  }

  #viewer-content {
    flex: 1;
    overflow: auto;
    padding: 14px;
  }

  #viewer-content::-webkit-scrollbar {
    width: 10px;
  }

  #viewer-content::-webkit-scrollbar-thumb {
    background: #252c36;
    border: 2px solid transparent;
    border-radius: 999px;
    background-clip: padding-box;
  }

  .empty-state {
    height: 100%;
    display: grid;
    place-items: center;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }

  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .code-block {
    position: relative;
    background: var(--editor-bg);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-md);
    overflow: hidden;
  }

  .code-content {
    overflow: auto;
    padding: 12px 0;
  }

  .code-content pre {
    margin: 0;
    padding: 0;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    font-size: 12px;
    line-height: 1.6;
    color: var(--text);
  }

  .code-line {
    display: flex;
    padding: 0 12px;
  }

  .code-line:hover {
    background: rgba(124, 166, 255, 0.05);
  }

  .line-number {
    min-width: 40px;
    text-align: right;
    color: var(--text-faint);
    user-select: none;
    padding-right: 12px;
  }

  .line-content {
    flex: 1;
    white-space: pre;
  }

  .markdown-content {
    color: var(--text);
    line-height: 1.6;
    font-size: 14px;
  }

  .markdown-content > :first-child {
    margin-top: 0;
  }

  .markdown-content > :last-child {
    margin-bottom: 0;
  }

  .markdown-content h1,
  .markdown-content h2,
  .markdown-content h3,
  .markdown-content h4,
  .markdown-content h5,
  .markdown-content h6 {
    margin: 1.2em 0 0.6em;
    color: var(--accent-strong);
    font-weight: 600;
    line-height: 1.3;
  }

  .markdown-content h1 { font-size: 1.6rem; }
  .markdown-content h2 { font-size: 1.4rem; }
  .markdown-content h3 { font-size: 1.2rem; }

  .markdown-content p {
    margin: 0.85em 0;
  }

  .markdown-content ul,
  .markdown-content ol {
    margin: 0.85em 0;
    padding-left: 1.5rem;
  }

  .markdown-content li {
    margin: 0.3rem 0;
  }

  .markdown-content code {
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    font-size: 12px;
    padding: 0.15rem 0.35rem;
    border-radius: 6px;
    background: rgba(124, 166, 255, 0.1);
    color: var(--accent-strong);
  }

  .markdown-content pre {
    margin: 0.85em 0;
    padding: 12px;
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-md);
    background: var(--editor-bg);
    overflow-x: auto;
  }

  .markdown-content pre code {
    padding: 0;
    background: none;
    color: var(--text);
  }

  .markdown-content blockquote {
    margin: 0.85em 0;
    padding-left: 12px;
    border-left: 3px solid var(--accent);
    color: var(--text-muted);
  }

  .markdown-content a {
    color: var(--accent-strong);
    text-decoration: none;
  }

  .markdown-content a:hover {
    text-decoration: underline;
  }

  .markdown-content hr {
    margin: 1.5em 0;
    border: 0;
    border-top: 1px solid var(--border-soft);
  }

  .markdown-content img {
    max-width: 100%;
    border-radius: var(--radius-md);
    margin: 0.85em 0;
  }

  .binary-placeholder {
    padding: 40px 20px;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: var(--radius-md);
    color: var(--text-muted);
    background: var(--editor-bg);
  }

  .binary-placeholder h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }

  .image-viewer {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .image-viewer img {
    max-width: 100%;
    max-height: calc(100vh - 200px);
    border-radius: var(--radius-md);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  }

  .pdf-viewer {
    width: 100%;
    height: 100%;
    border: none;
  }

  @media (max-width: 768px) {
    body {
      padding: 0;
    }

    #shell {
      height: 100vh;
      border: none;
      border-radius: 0;
    }

    #tree {
      width: 200px;
    }

    .controls {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<main id="shell">
  <header class="topbar">
    <div class="topbar-row">
      <div class="title-stack">
        <div class="title-badge">📁</div>
        <div class="title-copy">
          <h1>Sandbox Files</h1>
          <p id="root-label" style="font-size:11px;color:var(--text-faint);margin-top:1px;"></p>
        </div>
      </div>
    </div>

    <div class="controls">
      <label class="field">
        <span class="field-label">API URL</span>
        <input id="api-url" type="text" placeholder="API URL">
      </label>
      <label class="field">
        <span class="field-label">Session ID</span>
        <input id="sandbox-id" type="text" placeholder="Enter session ID">
      </label>
      <div class="field">
        <span class="field-label">&nbsp;</span>
        <button id="load-btn" class="primary">Load</button>
      </div>
    </div>
  </header>

  <section id="content">
    <aside id="tree">
      <div class="empty-state">Enter a Session ID and click Load</div>
    </aside>

    <div class="drag-handle"></div>

    <section id="viewer">
      <div id="viewer-header" style="display: none;">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div>
            <h2 id="file-name"></h2>
            <p id="file-meta"></p>
          </div>
          <div style="display:flex;gap:6px;">
            <button id="edit-btn" onclick="toggleEdit()" style="font-size:11px;padding:5px 10px;">Edit</button>
            <button id="save-btn" onclick="saveEdit()" class="primary" style="font-size:11px;padding:5px 10px;display:none;">Save</button>
            <button id="cancel-btn" onclick="cancelEdit()" style="font-size:11px;padding:5px 10px;display:none;">Cancel</button>
          </div>
        </div>
      </div>
      <div id="viewer-content">
        <div class="empty-state">Select a file to view its contents</div>
      </div>
    </section>
  </section>
</main>

<script>
const $ = (id) => document.getElementById(id);

const state = {
  apiUrl: '',
  sessionId: '',
  root: '',
  tree: null,
  expanded: new Set(),
  selectedPath: null,
  selectedContent: null,
  treeWidth: 260,
  refreshInterval: null,
  editing: false,
};

// Initialize API URL to current origin
$('api-url').value = window.location.origin;

// Format file size
function formatSize(bytes) {
  if (!bytes || bytes === 0) return '';
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  if (bytes < 1024 * 1024 * 1024) return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
  return `${(bytes / (1024 * 1024 * 1024)).toFixed(1)} GB`;
}

// Escape HTML
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Simple markdown renderer
function renderMarkdown(text) {
  let html = escapeHtml(text);

  // Code blocks
  html = html.replace(/```([a-z]*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${code}</code></pre>`;
  });

  // Headers
  html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');

  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  // Italic
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

  // Lists
  html = html.replace(/^\* (.*$)/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

  // Horizontal rule
  html = html.replace(/^---$/gm, '<hr>');

  // Paragraphs
  html = html.split('\n\n').map(para => {
    if (para.startsWith('<') || para.trim() === '') return para;
    return `<p>${para}</p>`;
  }).join('\n');

  return html;
}

// Render tree node
function renderTreeNode(node, depth, container) {
  const isDir = node.type === 'directory';
  const isExpanded = state.expanded.has(node.path);
  const isSelected = state.selectedPath === node.path;

  const nodeEl = document.createElement('div');
  nodeEl.className = `tree-node ${isDir ? 'directory' : ''} ${isSelected ? 'selected' : ''}`;
  nodeEl.style.paddingLeft = `${12 + depth * 16}px`;

  const icon = document.createElement('span');
  icon.className = 'tree-icon';
  icon.textContent = isDir ? (isExpanded ? '📂' : '📁') : '📄';

  const name = document.createElement('span');
  name.className = 'tree-name';
  name.textContent = node.name;

  nodeEl.appendChild(icon);
  nodeEl.appendChild(name);

  if (!isDir && node.size) {
    const size = document.createElement('span');
    size.className = 'tree-size';
    size.textContent = formatSize(node.size);
    nodeEl.appendChild(size);
  }

  nodeEl.addEventListener('click', (e) => {
    e.stopPropagation();
    if (isDir) {
      toggleExpand(node.path);
    } else {
      loadFile(node.path, node.name, node.size);
    }
  });

  container.appendChild(nodeEl);

  if (isDir && isExpanded && node.children) {
    const childContainer = document.createElement('div');
    childContainer.className = 'tree-children';
    node.children.forEach(child => renderTreeNode(child, depth + 1, childContainer));
    container.appendChild(childContainer);
  }
}

// Toggle expand/collapse
function toggleExpand(path) {
  if (state.expanded.has(path)) {
    state.expanded.delete(path);
  } else {
    state.expanded.add(path);
  }
  renderTree();
}

// Render entire tree
function renderTree() {
  const treeEl = $('tree');
  treeEl.innerHTML = '';

  if (!state.tree || !state.tree.length) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No files found';
    treeEl.appendChild(empty);
    return;
  }

  state.tree.forEach(node => renderTreeNode(node, 0, treeEl));
}

// Load tree from API
async function loadTree() {
  state.apiUrl = $('api-url').value.trim().replace(/\/+$/, '');
  state.sessionId = $('sandbox-id').value.trim();

  if (!state.apiUrl || !state.sessionId) {
    alert('Please enter both API URL and Session ID');
    return;
  }

  const treeEl = $('tree');
  treeEl.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';

  try {
    const resp = await fetch(`${state.apiUrl}/sessions/${state.sessionId}/files/tree`);
    if (!resp.ok) {
      throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
    }

    state.tree = await resp.json();
    renderTree();

    // Fetch session metadata for the root label
    try {
      const sessResp = await fetch(`${state.apiUrl}/sessions/${state.sessionId}/status`);
      if (sessResp.ok) {
        const status = await sessResp.json();
        state.root = status.supervisor_url ? '' : '';  // root not exposed on status; left blank
        $('root-label').textContent = '';
      }
    } catch (_) {}

    // Start auto-refresh
    if (state.refreshInterval) {
      clearInterval(state.refreshInterval);
    }
    state.refreshInterval = setInterval(() => {
      loadTreeSilent();
    }, 15000);

  } catch (error) {
    treeEl.innerHTML = `<div class="empty-state">Error loading tree:<br>${escapeHtml(error.message)}</div>`;
  }
}

// Silent tree refresh (no loading spinner)
async function loadTreeSilent() {
  if (!state.apiUrl || !state.sessionId) return;

  try {
    const resp = await fetch(`${state.apiUrl}/sessions/${state.sessionId}/files/tree`);
    if (resp.ok) {
      state.tree = await resp.json();
      renderTree();
    }
  } catch (error) {
    // Silently fail on refresh
  }
}

// Load file content
async function loadFile(path, name, size) {
  state.selectedPath = path;
  renderTree();

  const viewerContent = $('viewer-content');
  const viewerHeader = $('viewer-header');
  const fileName = $('file-name');
  const fileMeta = $('file-meta');

  viewerContent.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
  viewerHeader.style.display = 'block';
  fileName.textContent = name;
  fileMeta.textContent = formatSize(size);

  try {
    const resp = await fetch(`${state.apiUrl}/sessions/${state.sessionId}/files/read?path=${encodeURIComponent(path)}`);
    if (!resp.ok) {
      throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
    }

    const data = await resp.json();
    state.selectedContent = data;
    state.editing = false;
    $('edit-btn').style.display = (data.binary) ? 'none' : '';
    $('save-btn').style.display = 'none';
    $('cancel-btn').style.display = 'none';
    renderFileContent(data);

  } catch (error) {
    viewerContent.innerHTML = `<div class="empty-state">Error loading file:<br>${escapeHtml(error.message)}</div>`;
  }
}

// Render file content based on type
function renderFileContent(data) {
  const viewerContent = $('viewer-content');
  const fileMeta = $('file-meta');

  fileMeta.textContent = `${formatSize(data.size)}`;

  // Binary file
  if (data.binary && !data.image && !data.pdf) {
    viewerContent.innerHTML = `
      <div class="binary-placeholder">
        <h3>Binary file</h3>
        <p>${formatSize(data.size)}</p>
      </div>
    `;
    return;
  }

  // Image
  if (data.image) {
    viewerContent.innerHTML = `
      <div class="image-viewer">
        <img src="${data.content}" alt="${escapeHtml(data.name)}">
      </div>
    `;
    return;
  }

  // PDF
  if (data.pdf) {
    viewerContent.innerHTML = `
      <iframe class="pdf-viewer" src="${data.content}"></iframe>
    `;
    return;
  }

  // Markdown
  if (data.name.endsWith('.md')) {
    viewerContent.innerHTML = `
      <div class="markdown-content">${renderMarkdown(data.content)}</div>
    `;
    return;
  }

  // Code/text
  const lines = data.content.split('\n');
  const codeHtml = lines.map((line, i) => {
    return `<div class="code-line"><span class="line-number">${i + 1}</span><span class="line-content">${escapeHtml(line)}</span></div>`;
  }).join('');

  viewerContent.innerHTML = `
    <div class="code-block">
      <div class="code-content">
        <pre>${codeHtml}</pre>
      </div>
    </div>
  `;
}

// ── Edit mode ──

function toggleEdit() {
  if (!state.selectedContent || state.selectedContent.binary) return;
  state.editing = true;
  $('edit-btn').style.display = 'none';
  $('save-btn').style.display = '';
  $('cancel-btn').style.display = '';

  const viewerContent = $('viewer-content');
  const textarea = document.createElement('textarea');
  textarea.id = 'edit-textarea';
  textarea.value = state.selectedContent.content;
  textarea.style.cssText = `
    width:100%;height:100%;border:none;background:var(--editor-bg);color:var(--text);
    font-family:"SF Mono","Fira Code","Consolas",monospace;font-size:12px;line-height:1.6;
    padding:14px;resize:none;outline:none;tab-size:4;
  `;
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      textarea.value = textarea.value.substring(0, start) + '  ' + textarea.value.substring(end);
      textarea.selectionStart = textarea.selectionEnd = start + 2;
    }
    if (e.key === 's' && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      saveEdit();
    }
    if (e.key === 'Escape') {
      cancelEdit();
    }
  });
  viewerContent.innerHTML = '';
  viewerContent.appendChild(textarea);
  textarea.focus();
}

async function saveEdit() {
  const textarea = $('edit-textarea');
  if (!textarea || !state.selectedPath) return;

  const newContent = textarea.value;
  const oldContent = state.selectedContent.content;

  $('save-btn').disabled = true;
  $('save-btn').textContent = 'Saving...';

  try {
    const resp = await fetch(`${state.apiUrl}/sessions/${state.sessionId}/files/edit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        path: state.selectedPath,
        old_string: oldContent,
        new_string: newContent,
      }),
    });

    const result = await resp.json();
    if (!resp.ok) {
      // If old content changed underneath us, try write mode (overwrite)
      const retry = await fetch(`${state.apiUrl}/sessions/${state.sessionId}/files/edit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          path: state.selectedPath,
          old_string: '',
          new_string: newContent,
        }),
      });
      const retryResult = await retry.json();
      if (!retry.ok) {
        alert('Save failed: ' + (retryResult.error || 'unknown error'));
        $('save-btn').disabled = false;
        $('save-btn').textContent = 'Save';
        return;
      }
    }

    // Reload the file to show updated content
    state.editing = false;
    await loadFile(state.selectedPath, state.selectedContent.name, null);
    loadTreeSilent();
  } catch (error) {
    alert('Save failed: ' + error.message);
  } finally {
    $('save-btn').disabled = false;
    $('save-btn').textContent = 'Save';
  }
}

function cancelEdit() {
  state.editing = false;
  $('edit-btn').style.display = '';
  $('save-btn').style.display = 'none';
  $('cancel-btn').style.display = 'none';
  if (state.selectedContent) {
    renderFileContent(state.selectedContent);
  }
}

// Drag handle for resizing
const dragHandle = document.querySelector('.drag-handle');
const treeEl = $('tree');

let isDragging = false;

dragHandle.addEventListener('mousedown', (e) => {
  isDragging = true;
  dragHandle.classList.add('dragging');
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;

  const newWidth = e.clientX - treeEl.getBoundingClientRect().left;
  if (newWidth >= 160 && newWidth <= 480) {
    treeEl.style.width = `${newWidth}px`;
    state.treeWidth = newWidth;
  }
});

document.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    dragHandle.classList.remove('dragging');
  }
});

// Event listeners
$('load-btn').addEventListener('click', loadTree);

$('sandbox-id').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    loadTree();
  }
});

// Cleanup on page unload
window.addEventListener('beforeunload', () => {
  if (state.refreshInterval) {
    clearInterval(state.refreshInterval);
  }
});
</script>
