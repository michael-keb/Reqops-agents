# nginx LB for agent-sdk multi-replica bench.
#
# Routing strategy mirrors benchmark/scale/lb.py:
#   • /sessions/{id}/... → consistent-hash on session_id
#   • everything else (POST /sessions, /volumes, /agents) → round-robin
#
# Run with:
#   nginx -p $(pwd) -c benchmark/scale/nginx.conf
#
# Listens on PORT env (default 7778). Backends are PORT_BASE..(BASE+N-1).
#
# Streaming-friendly:
#   proxy_buffering off          # SSE blocks reach client immediately
#   proxy_read_timeout 1h        # long-running streams survive
#   proxy_http_version 1.1       # required for keep-alive + chunked
#   proxy_set_header Connection ""  # don't propagate hop-by-hop
#
# The 307 from the worker's NotOwner handler is passed through as-is —
# the SDK has follow_redirects=True so it transparently retries against
# the lease owner. Unlike the Python LB this nginx config doesn't do
# affinity learning; you pay one 307 per first-prompt-per-session.

daemon off;
# 2 workers is the sweet spot for a 4-replica backend: one worker per
# replica-pair gives enough parallelism without flooding the upstream
# keepalive pool. ``worker_processes auto`` on a 32-core box spawns 32
# nginx workers that fight for CPU against the uvicorn replicas — bench
# showed a ~25% throughput regression vs 2 workers.
worker_processes 2;
error_log stderr warn;
pid /tmp/agent-sdk-nginx.pid;

events {
    worker_connections 4096;
}

http {
    access_log off;

    # Hash session_id (uuid form) out of the URL path. For
    # ``/sessions/{id}/...`` the id is in the URL; for ``POST /sessions``
    # there is no id in the URL yet — the SDK supplies it via the
    # ``X-Session-Id`` header so this same value can drive routing on
    # both requests. The map prefers URL over header.
    map $request_uri $url_sid {
        "~^/sessions/(?<sid>[0-9a-f-]+)" $sid;
        default "";
    }
    map $url_sid $route_key {
        ""      $http_x_session_id;
        default $url_sid;
    }

    # Explicit cookie → backend map for failover. The server's NotOwner
    # handler emits ``Set-Cookie: agent_sdk_route=<owner>;
    # Path=/sessions/<sid>`` on the 307; subsequent requests for that
    # session carry the cookie and route directly to the new owner,
    # bypassing the consistent-hash. Cookie scope is per-session so
    # other sessions' routing is unaffected. Empty cookie falls through
    # to ``hash $route_key consistent``.
    map $cookie_agent_sdk_route $sticky_backend {
        "r0"    127.0.0.1:7791;
        "r1"    127.0.0.1:7792;
        "r2"    127.0.0.1:7793;
        "r3"    127.0.0.1:7794;
        default "";
    }

    upstream agent_sdk_hash {
        hash $route_key consistent;
        server 127.0.0.1:7791;
        server 127.0.0.1:7792;
        server 127.0.0.1:7793;
        server 127.0.0.1:7794;
        keepalive 128;
    }

    upstream agent_sdk_rr {
        # Round-robin (the default) — POST /sessions, /volumes, /agents.
        server 127.0.0.1:7791;
        server 127.0.0.1:7792;
        server 127.0.0.1:7793;
        server 127.0.0.1:7794;
        keepalive 128;
    }

    # Sane defaults for SSE + long-running requests.
    proxy_http_version 1.1;
    proxy_set_header   Connection "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_buffering    off;
    proxy_request_buffering off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;

    server {
        listen 7778;

        # /sessions/{id}/... — if the failover cookie is present, route
        # directly to its named replica. Otherwise consistent-hash on
        # session_id from URL (no client-side state needed; new clients
        # work without any cookie).
        location ~ ^/sessions/[0-9a-f-]+(/.*)?$ {
            if ($sticky_backend != "") {
                proxy_pass http://$sticky_backend;
                break;
            }
            proxy_pass http://agent_sdk_hash;
        }

        # POST /sessions — if the SDK supplied X-Session-Id, hash on
        # that so POST and subsequent /sessions/{id}/* land on the
        # same replica with zero redirects. Old SDK builds without the
        # header fall through to round-robin.
        location = /sessions {
            if ($http_x_session_id != "") {
                proxy_pass http://agent_sdk_hash;
                break;
            }
            proxy_pass http://agent_sdk_rr;
        }

        # Everything else → round-robin
        location / {
            proxy_pass http://agent_sdk_rr;
        }
    }
}
