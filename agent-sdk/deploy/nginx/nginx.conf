# Production nginx LB for agent-sdk on Railway.
#
# Routing strategy matches benchmark/scale/nginx.conf:
#   • POST /sessions  → round-robin (no session id yet); the server emits
#                       ``Set-Cookie: agent_sdk_route=<replica_id>; Path=/sessions``
#                       on the response so the client carries the sticky
#                       hint on subsequent requests.
#   • /sessions/{id}/...  → if the cookie names a known replica, route
#                           there; otherwise consistent-hash on session_id
#                           (URL-extracted) so routing is still deterministic.
#
# The Postgres lease + 307 redirect catches any mis-route (e.g. cookie
# names a replica that got replaced); the SDK's follow_redirects=True
# handles the second hop transparently.
#
# This file uses two ``# {{ ... }}`` markers that entrypoint.sh fills in
# from AGENT_SDK_UPSTREAM / AGENT_SDK_FALLBACK before nginx starts.

daemon off;
# 2 workers is the sweet spot for a typical 4-replica backend — more
# workers fight upstream for CPU and add scheduler pressure. Bump only
# if you scale the backend past ~8 replicas.
worker_processes 2;
error_log stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    access_log off;

    # Hash session_id (uuid form) out of the URL path. For
    # ``/sessions/{id}/...`` the id is in the URL; for ``POST /sessions``
    # there is no id in the URL yet — the SDK supplies it via the
    # ``X-Session-Id`` header so this same value drives routing for both.
    map $request_uri $url_sid {
        "~^/sessions/(?<sid>[0-9a-f-]+)" $sid;
        default "";
    }
    map $url_sid $route_key {
        ""      $http_x_session_id;
        default $url_sid;
    }

    # Explicit cookie -> backend map for FAILOVER. Generated by
    # entrypoint.sh from AGENT_SDK_UPSTREAM at container start. The
    # server's NotOwner handler emits ``Set-Cookie:
    # agent_sdk_route=<owner>; Path=/sessions/<sid>`` on the 307 when a
    # session has migrated to a new owner; subsequent requests carry
    # the cookie and route directly here, bypassing the consistent-hash.
    # Cookie scope is per-session so other sessions aren't affected.
    map $cookie_agent_sdk_route $sticky_backend {
        # {{STICKY_MAP}}
        default "";
    }

    # Default upstream — consistent-hash on the URL session_id (or the
    # X-Session-Id header on POST /sessions). Steady-state routing; no
    # client-side state needed.
    upstream agent_sdk_hash {
        hash $route_key consistent;
        # {{FALLBACK_HASH_SERVERS}}
        keepalive 128;
    }

    # Round-robin upstream — POST /sessions, /volumes, /agents (no
    # session-affinity needed). Same backend set, default RR policy.
    upstream agent_sdk_rr {
        # {{FALLBACK_HASH_SERVERS}}
        keepalive 128;
    }

    # SSE + long-running stream defaults.
    proxy_http_version 1.1;
    proxy_set_header   Connection "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_buffering    off;
    proxy_request_buffering off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;

    server {
        # Railway sets $PORT to the public port at deploy time; entrypoint.sh
        # substitutes it into a copy of this file before nginx starts.
        listen # {{LISTEN_PORT}};

        # /sessions/{id}/... — failover cookie wins when present;
        # otherwise consistent-hash on session_id from URL. Both paths
        # are deterministic; no client-side state is required for
        # steady-state routing.
        location ~ ^/sessions/[0-9a-f-]+(/.*)?$ {
            if ($sticky_backend != "") {
                proxy_pass http://$sticky_backend;
                break;
            }
            proxy_pass http://agent_sdk_hash;
        }

        # POST /sessions — if the SDK supplied ``X-Session-Id``, hash
        # on that so POST and subsequent /sessions/{id}/* land on the
        # same replica. Old clients without the header fall through to
        # round-robin.
        location = /sessions {
            if ($http_x_session_id != "") {
                proxy_pass http://agent_sdk_hash;
                break;
            }
            proxy_pass http://agent_sdk_rr;
        }

        # Everything else → round-robin.
        location / {
            proxy_pass http://agent_sdk_rr;
        }
    }
}
